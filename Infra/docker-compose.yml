version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: yoga_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: YogaPlatformDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - yoga_postgres_data:/var/lib/postgresql/data

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    container_name: yoga_pgbackups
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=YogaPlatformDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    depends_on:
      - postgres
    volumes:
      - ./backups:/backups

  redis:
    image: redis:7-alpine
    container_name: yoga_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build:
      context: ../Backend
      dockerfile: Yoga.Api/Dockerfile
    container_name: yoga_api
    depends_on:
      - postgres
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Database=YogaPlatformDb;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
    ports:
      - '5253:8080'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/swagger`) || PathPrefix(`/health`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  traefik:
    image: traefik:v3.0
    container_name: yoga_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: yoga_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: yoga_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
    environment:
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-http://localhost:5001/alerts}
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: yoga_blackbox
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    ports:
      - '9115:9115'
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: yoga_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - '3000:3000'
    volumes:
      - yoga_grafana_data:/var/lib/grafana

volumes:
  yoga_postgres_data:
  yoga_grafana_data:
