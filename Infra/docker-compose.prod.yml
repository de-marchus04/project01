version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: yoga_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-YogaPlatformDb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - yoga_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-YogaPlatformDb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    container_name: yoga_pgbackups
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-YogaPlatformDb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    depends_on:
      - postgres
    volumes:
      - ./backups:/backups

  api:
    build:
      context: ../Backend
      dockerfile: Yoga.Api/Dockerfile
    container_name: yoga_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Database=${POSTGRES_DB:-YogaPlatformDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Security__JwtKey: ${Security__JwtKey}
      Security__AdminCreationKey: ${Security__AdminCreationKey}
      Security__JwtKeyVersion: ${Security__JwtKeyVersion}
      Database__ApplySeedOnStartup: "false"
    expose:
      - '8080'

  nginx:
    image: nginx:alpine
    container_name: yoga_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../Frontend:/usr/share/nginx/html:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: yoga_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: yoga_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
    environment:
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: yoga_blackbox
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    ports:
      - '9115:9115'
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: yoga_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - '3000:3000'
    volumes:
      - yoga_grafana_data:/var/lib/grafana

volumes:
  yoga_postgres_data:
  yoga_grafana_data:
