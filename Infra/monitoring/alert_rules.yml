groups:
  - name: yoga-api-alerts
    rules:
      - alert: YogaApiDown
        expr: probe_success{job="yoga-api-probe"} == 0
        for: 2m
        labels:
          severity: critical
          service: yoga-api
        annotations:
          summary: "Yoga API недоступен"
          description: "Проверка /health endpoint неуспешна более 2 минут."

      - alert: YogaApiSlowHealthResponse
        expr: probe_duration_seconds{job="yoga-api-probe"} > 1
        for: 5m
        labels:
          severity: warning
          service: yoga-api
        annotations:
          summary: "Медленный health endpoint"
          description: "Время ответа health endpoint > 1с в течение 5 минут."
