<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOGA.LIFE | Блог</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Unified Styles -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        :root {
            --primary-bg: #f8f9fa;
            --text-dark: #2c3e50;
            --brand-color: #d4a373;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-dark);
            padding-top: 76px;
        }
        .article-hero {
            height: 50vh;
            background-size: cover;
            background-position: center;
            position: relative;
            /* margin-top: -76px;  <-- Remove this to prevent overlap with solid navbar */
            display: flex;
            align-items: flex-end;
            padding-bottom: 3rem;
        }
        .article-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
        }
        .hero-content {
            position: relative;
            z-index: 1;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .article-meta {
            font-size: 0.95rem;
            opacity: 0.9;
        }
        .article-body {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #4a4a4a;
        }
        .article-body p {
            margin-bottom: 1.5rem;
        }
        .share-btn {
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            background: #fff;
            color: var(--text-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
            text-decoration: none;
        }
        .share-btn:hover {
            transform: translateY(-3px);
            background: var(--brand-color);
            color: #fff;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color:#2c3e50!important;">YOGA.LIFE</a>
            <div class="d-flex gap-2">
                <a href="blog-articles.html" class="btn btn-outline-dark btn-sm">← Назад в блог</a>
            </div>
        </div>
    </nav>

    <header id="articleHero" class="article-hero">
        <div class="container hero-content">
            <div class="row">
                <div class="col-lg-8">
                    <span class="badge bg-warning text-dark mb-2" id="articleCategory">Lifestyle</span>
                    <h1 class="display-4 fw-bold mb-3" id="articleTitle">Загрузка...</h1>
                    <p class="h4 fw-light mb-4" id="articleSubtitle"></p>
                    <div class="d-flex align-items-center gap-3 article-meta">
                        <span><i class="bi bi-person-circle me-1"></i> <span id="articleAuthor">Admin</span></span>
                        <span><i class="bi bi-calendar3 me-1"></i> <span id="articleDate">...</span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-5">
        <div class="row">
            <div class="col-lg-8">
                <div class="article-body" id="articleContent">
                    <p class="placeholder-glow">
                        <span class="placeholder col-12"></span>
                        <span class="placeholder col-12"></span>
                        <span class="placeholder col-8"></span>
                    </p>
                </div>
                
                <hr class="my-5">
                
                <div class="d-flex align-items-center gap-3">
                    <span class="fw-bold">Поделиться:</span>
                    <a href="#" class="share-btn"><i class="bi bi-telegram"></i></a>
                    <a href="#" class="share-btn"><i class="bi bi-whatsapp"></i></a>
                    <a href="#" class="share-btn"><i class="bi bi-facebook"></i></a>
                </div>
            </div>
            
            <div class="col-lg-4 mt-5 mt-lg-0">
                <div class="sticky-top" style="top: 100px;">
                    <h4 class="fw-bold mb-4">Другие материалы</h4>
                    <div id="relatedArticles" class="d-flex flex-column gap-4">
                        <!-- Динамическая подгрузка -->
                    </div>
                    
                    <div class="card border-0 bg-light p-4 mt-5 rounded-4">
                        <h5 class="fw-bold mb-3">Начните практику сегодня</h5>
                        <p class="text-muted small">Присоединяйтесь к нашим онлайн-курсам и измените свою жизнь к лучшему.</p>
                        <a href="courses-beginners.html" class="btn btn-dark w-100 rounded-pill">Выбрать курс</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <p class="small text-muted mb-0">&copy; 2026 - YOGA.LIFE</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                window.location.href = 'blog-articles.html';
                return;
            }

            try {
                // 1. Load Article
                // Since we don't have a specific get-by-id endpoint publicly exposed in the controller shown earlier 
                // in the conversation (UsersController context), we'll assume standard REST behavior 
                // OR fetch all and filter if the backend is simple.
                // However, usually GET /api/articles/id exists. Let's try that.
                
                // Fallback: fetch all and find (if API is simple)
                // Optimization: try to fetch specific first.
                let article = null;
                try {
                    const resp = await fetch(`${API_URL}/articles/${id}`);
                    if (resp.ok) article = await resp.json();
                } catch {}

                if (!article) {
                    // Fallback to list search
                    const respList = await fetch(`${API_URL}/articles`);
                    const list = await respList.json();
                    article = list.find(a => a.id == id);
                }

                if (!article) throw new Error('Article not found');

                renderArticle(article);
                loadRelated(article.id);

            } catch (err) {
                document.getElementById('articleTitle').innerText = 'Статья не найдена';
                document.getElementById('articleContent').innerHTML = '<div class="alert alert-warning">К сожалению, этот материал не найден или был удален.</div>';
                console.error(err);
            }
        });

        function renderArticle(data) {
            document.title = `${data.title} | YOGA.LIFE Блог`;
            
            // Hero
            const hero = document.getElementById('articleHero');
            if (data.imageUrl) {
                hero.style.backgroundImage = `url('${data.imageUrl}')`;
            } else {
                hero.style.backgroundColor = '#2c3e50';
            }

            document.getElementById('articleCategory').innerText = data.category || 'Блог';
            document.getElementById('articleTitle').innerText = data.title;
            document.getElementById('articleSubtitle').innerText = data.subtitle || '';
            document.getElementById('articleAuthor').innerText = data.author || 'Редакция';
            
            if (data.createdAt) {
                const date = new Date(data.createdAt);
                document.getElementById('articleDate').innerText = date.toLocaleDateString('ru-RU', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
            }

            // Content - allow basic HTML or plain text
            // Simple replace of newlines to <p> tags if it looks like plain text
            let contentHtml = data.content || '';
            if (!contentHtml.includes('<p>')) {
                contentHtml = contentHtml.split('\n').map(line => line.trim() ? `<p>${line}</p>` : '').join('');
            }
            document.getElementById('articleContent').innerHTML = contentHtml;
        }

        async function loadRelated(currentId) {
            try {
                const resp = await fetch(`${API_URL}/articles`);
                let items = await resp.json();
                
                // Filter out current, take random 3
                items = items.filter(a => a.id != currentId);
                items = items.sort(() => 0.5 - Math.random()).slice(0, 3);

                const container = document.getElementById('relatedArticles');
                if (items.length === 0) {
                    container.innerHTML = '<p class="text-muted small">Нет других материалов.</p>';
                    return;
                }

                container.innerHTML = items.map(item => `
                    <a href="article-details.html?id=${item.id}" class="text-decoration-none text-dark">
                        <div class="card border-0 shadow-sm h-100">
                            <div style="height: 160px; overflow: hidden; border-radius: 8px 8px 0 0;">
                                <img src="${item.imageUrl || ''}" class="w-100 h-100 object-fit-cover" alt="${item.title}">
                            </div>
                            <div class="card-body p-3">
                                <span class="badge bg-light text-secondary mb-2">${item.category || 'Блог'}</span>
                                <h6 class="fw-bold mb-1">${item.title}</h6>
                            </div>
                        </div>
                    </a>
                `).join('');

            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
