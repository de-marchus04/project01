<section class="py-5 bg-light details-section" style="margin-top: 86px; min-height: 80vh;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h1 class="font-playfair mb-2 text-dark">Вопросы и предложения</h1>
                <p class="text-muted mb-4">Оставьте сообщение — мы обработаем его как обращение через систему заявок.</p>

                <form id="feedback-form" class="card border-0 shadow-sm p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Имя</label>
                            <input name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Телефон</label>
                            <input name="phone" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input name="email" type="email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Сообщение</label>
                            <textarea name="message" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-warning fw-bold">Отправить</button>
                        </div>
                    </div>
                    <div id="feedback-status" class="mt-3" role="status"></div>
                </form>
            </div>
        </div>
    </div>
</section>
