<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет | YOGA.LIFE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Montserrat', sans-serif; }
        .dashboard-header { background: #2c3e50; color: white; padding: 3rem 0; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand font-playfair" href="index.html">YOGA.LIFE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <span class="text-white-50" id="userNameDisplay">Loading...</span>
                    </li>
                    <li class="nav-item">
                        <button id="logoutBtn" class="btn btn-outline-light btn-sm rounded-pill px-3">Выйти</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="dashboard-header text-center">
        <div class="container">
            <h1 class="font-playfair display-5">Мои Программы</h1>
            <p class="lead text-white-50">Отслеживайте прогресс и продолжайте практику</p>
        </div>
    </header>

    <div class="container pb-5">
        <div class="row g-4" id="userCoursesContainer">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5253/api';

        document.addEventListener('DOMContentLoaded', async () => {
            // Check Auth
            const userJson = localStorage.getItem('yoga_user');
            if (!userJson) {
                window.location.href = 'login.html';
                return;
            }

            const userData = JSON.parse(userJson);
            const user = userData.user || userData;
            
            // Setup User Info
            document.getElementById('userNameDisplay').textContent = user.username || user.email;
            
            // Logout
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('yoga_user');
                window.location.href = 'index.html';
            });

            // Fetch User Orders
            const container = document.getElementById('userCoursesContainer');
            try {
                // In a real app we would filter by user ID/Name on the backend or have a /me/orders endpoint
                // Here we fetch all orders and filter client-side for simplicity (as per current backend)
                const res = await fetch(`${API_BASE}/orders`);
                if (!res.ok) throw new Error('Failed to fetch orders');
                
                const data = await res.json();
                const allOrders = data.Orders || data.orders || (Array.isArray(data) ? data : []);
                
                // Filter for current user
                const myOrders = allOrders.filter(o => o.username === user.username);
                
                if (myOrders.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="bi bi-basket display-1 text-muted mb-3"></i>
                            <h3 class="text-muted">У вас пока нет купленных курсов</h3>
                            <a href="index.html#courses" class="btn btn-primary rounded-pill mt-3 px-4">Выбрать курс</a>
                        </div>
                    `;
                } else {
                    container.innerHTML = myOrders.map(order => `
                        <div class="col-md-6 col-lg-4">
                            <div class="card h-100 shadow-sm border-0">
                                <div class="card-header bg-white border-bottom-0 pt-3">
                                    <span class="badge bg-success rounded-pill">Активен</span>
                                    <small class="text-muted float-end">${new Date(order.date).toLocaleDateString()}</small>
                                </div>
                                <div class="card-body">
                                    <h5 class="card-title fw-bold font-playfair">${order.productTitle}</h5>
                                    <p class="card-text text-muted small">Доступ открыт. Приятной практики!</p>
                                    <a href="#" class="btn btn-outline-dark w-100 rounded-pill mt-3">Перейти к занятиям</a>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="alert alert-danger text-center w-100">Ошибка загрузки данных. Попробуйте позже.</div>';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
