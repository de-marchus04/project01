<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог | YOGA.LIFE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .page-hero {
            height: 50vh;
            min-height: 400px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1544367563-12123d8965bf?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand font-playfair fs-3" href="index.html">YOGA.LIFE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link active" href="blog-articles.html">Блог</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="page-hero">
        <div class="container">
            <h1 class="font-playfair display-3">Наш Блог</h1>
            <p class="lead text-white-50">Полезные материалы для вашей практики</p>
        </div>
    </header>

    <div class="container py-5">
        <div class="row g-4" id="articlesGrid">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('articlesGrid');
            try {
                const res = await fetch('http://localhost:5253/api/articles');
                if(!res.ok) throw new Error('Network error');
                const articles = await res.json();
                
                if(articles.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-muted">Статей пока нет.</div>';
                    return;
                }
                
                grid.innerHTML = articles.map(a => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="${a.imageUrl || 'https://via.placeholder.com/300x200'}" class="card-img-top" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title font-playfair fw-bold">${a.title}</h5>
                                <p class="card-text text-muted small">${a.subtitle || 'Интересная статья о йоге...'}</p>
                                <a href="#" class="btn btn-link text-decoration-none p-0">Читать далее &rarr;</a>
                            </div>
                            <div class="card-footer bg-white border-0 text-muted small">
                                ${new Date(a.createdAt).toLocaleDateString()}
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch(e) {
                console.error(e);
                grid.innerHTML = '<div class="col-12 text-center text-danger">Не удалось загрузить статьи.</div>';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
